# Window Customization
window:
  dimensions:
    columns: 140
    lines: 38
  padding:
    x: 15
    y: 15
  decorations: buttonless
scrolling:
  history: 10000
  multiplier: 2
background_opacity: 1

font:
  # The normal (roman) font face to use.
  # Style can be specified to pick a specific face.
  normal:
     family: "SF Mono"
     style: "Regular"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: Retina

  # The bold font face
  bold:
    family: "SF Mono"
    style: "Medium"

  # The italic font face
  italic:
    family: "SF Mono"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: "Medium Italic"

  # Point size of the font
  size: 14.0

  # Colors (Ayu Dark)
colors:
  # Default colors
  primary:
    background: '0x0F1419'
    foreground: '0xB3B1AD'

  # Normal colors
  normal:
    black: '0x01060E'
    red: '0xEA6C73'
    green: '0x91B362'
    yellow: '0xF9AF4F'
    blue: '0x53BDFA'
    magenta: '0xFAE994'
    cyan: '0x90E1C6'
    white: '0xC7C7C7'

  # Bright colors
  bright:
    black: '0x686868'
    red: '0xF07178'
    green: '0xC2D94C'
    yellow: '0xFFB454'
    blue: '0x59C2FF'
    magenta: '0xFFEE99'
    cyan: '0x95E6CB'
    white: '0xFFFFFF'


key_bindings:
  - { key: PageUp,   mods: Shift, action: ScrollPageUp,   mode: ~Alt       }
  - { key: T, mods: Command, action: SpawnNewInstance }
  - { key: Add, mods: Command, action: IncreaseFontSize }
  - { key: Subtract, mods: Command, action: DecreaseFontSize }
  - { key: K,        mods: Command, command: { program: "/usr/bin/clear" } }
  - { key: R, mods: Command, action: ResetFontSize }
  - { key: W, mods: Command, action: None }

cursor:
    style: Beam
