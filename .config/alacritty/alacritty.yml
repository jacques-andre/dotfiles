# Window Customization
window:
  dimensions:
    columns: 140
    lines: 38
  padding:
    x: 15
    y: 15
  decorations: buttonless
scrolling:
  history: 10000
  multiplier: 3
background_opacity: 1

font:
  # The normal (roman) font face to use.
  # Style can be specified to pick a specific face.
  normal:
     family: "IBM Plex Mono"
     style: "Medium"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: Retina

  # The bold font face
  bold:
    family: "IBM Plex Mono"
    style: "Medium"

  # The italic font face
  italic:
    family: "IBM Plex Mono"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: "Medium Italic"

  # Point size of the font
  size: 16.0

# Colors (One Dark)
colors:
  # Default colors
  primary:
    background: '#282c34'
    foreground: '#abb2bf'

  # Normal colors
  normal:
    # NOTE: Use '#131613' for the `black` color if you'd like to see
    # black text on the background.
    black:   '#282c34'
    red:     '#e06c75'
    green:   '#98c379'
    yellow:  '#d19a66'
    blue:    '#61afef'
    magenta: '#c678dd'
    cyan:    '#56b6c2'
    white:   '#abb2bf'

  # Bright colors
  bright:
    black:   '#5c6370'
    red:     '#e06c75'
    green:   '#98c379'
    yellow:  '#d19a66'
    blue:    '#61afef'
    magenta: '#c678dd'
    cyan:    '#56b6c2'
    white:   '#ffffff'
key_bindings:
  - { key: PageUp,   mods: Shift, action: ScrollPageUp,   mode: ~Alt       }
  - { key: T, mods: Command, action: SpawnNewInstance }
  - { key: Add, mods: Command, action: IncreaseFontSize }
  - { key: Subtract, mods: Command, action: DecreaseFontSize }
  - { key: K,        mods: Command, command: { program: "/usr/bin/clear" } }
  - { key: R, mods: Command, action: ResetFontSize }
  - { key: W, mods: Command, action: None }

cursor: 
    style: Beam
