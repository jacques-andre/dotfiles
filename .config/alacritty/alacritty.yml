# Window Customization
window:
  dimensions:
    columns: 140
    lines: 38
  padding:
    x: 15
    y: 15
  decorations: buttonless
scrolling:
  history: 10000
  multiplier: 2
background_opacity: 1

font:
  # The normal (roman) font face to use.
  # Style can be specified to pick a specific face.
  normal:
     family: "SF Mono"
     style: "Regular"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: Retina

  # The bold font face
  bold:
    family: "SF Mono"
    style: "Medium"

  # The italic font face
  italic:
    family: "SF Mono"
    # family: "Fira Code"
    # family: "Source Code Pro"
    # style: "Medium Italic"

  # Point size of the font
  size: 14.0

  # Colors (Base16 Default Dark)
colors:
  # Default colors
  primary:
    background: '#282C34'
    foreground: '#d8d8d8'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '#d8d8d8'
    cursor: '#d8d8d8'

  # Normal colors
  normal:
    black:   '#181818'
    red:     '#ab4642'
    green:   '#a1b56c'
    yellow:  '#f7ca88'
    blue:    '#7cafc2'
    magenta: '#ba8baf'
    cyan:    '#86c1b9'
    white:   '#d8d8d8'

  # Bright colors
  bright:
    black:   '#585858'
    red:     '#ab4642'
    green:   '#a1b56c'
    yellow:  '#f7ca88'
    blue:    '#7cafc2'
    magenta: '#ba8baf'
    cyan:    '#86c1b9'
    white:   '#f8f8f8'


key_bindings:
  - { key: PageUp,   mods: Shift, action: ScrollPageUp,   mode: ~Alt       }
  - { key: T, mods: Command, action: SpawnNewInstance }
  - { key: Add, mods: Command, action: IncreaseFontSize }
  - { key: Subtract, mods: Command, action: DecreaseFontSize }
  - { key: K,        mods: Command, command: { program: "/usr/bin/clear" } }
  - { key: R, mods: Command, action: ResetFontSize }
  - { key: W, mods: Command, action: None }

cursor:
    style: Beam
